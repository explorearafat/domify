<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Domify - Find Your Domain Name</title>

    <link rel="stylesheet" href="/static/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="hero">

            <h1>Domify</h1>

            <p>Find Your Domain Name & Price Instantly</p>

        </div>



        <div class="search-card">

            <div class="search-box">

                <input type="text" id="query" placeholder="Enter Your Company or Brand Name.....">

                <button onclick="searchDomain()">

                    <i class="fas fa-search"></i> Search

                </button>

            </div>

        </div>



        <div id="loading" class="loading hidden">

            <div class="dot-spinner">

                <span></span><span></span><span></span>

            </div>

            <span>Scanning domain universe...</span>

        </div>



        <div id="results"></div>

    </div>



    <canvas id="graphCanvas" style="display: none;"></canvas>

    <footer class="footer">

        <p>

            © 2026 All Right Reserved <span class="highlight">★Faith</span>

        </p>

    </footer>

    <script src="/static/app.js"></script>

</body>

</html>
